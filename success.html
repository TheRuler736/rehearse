<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — Rehearse</title>
  <meta name="description" content="You're subscribed to Rehearse. Text to start your first mock interview." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#ffffff; --fg:#0a0a0a; --muted:#6b6b6b; --line:#ececec; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      min-height:100dvh; display:flex; align-items:center; justify-content:center;
      text-align:center; overflow:hidden; -webkit-font-smoothing:antialiased;
    }
    main { width:100%; max-width:560px; padding:clamp(20px,5vh,48px) 28px; animation:rise .8s cubic-bezier(.2,.7,.2,1) both; }
    @keyframes rise { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

    .check {
      width:64px; height:64px; margin:0 auto clamp(18px,3vh,28px);
      border-radius:999px; background:#0a0a0a; display:flex; align-items:center; justify-content:center;
      box-shadow:0 12px 30px rgba(0,0,0,0.18);
    }
    .eyebrow { font-size:0.78rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    h1 {
      font-family:'Instrument Serif',Georgia,serif; font-weight:400;
      font-size:clamp(2.2rem,6vw,3.4rem); line-height:1.04; letter-spacing:-0.01em;
      margin-bottom:clamp(12px,2vh,18px);
    }
    p.sub { color:var(--muted); font-size:clamp(1rem,2.2vh,1.12rem); line-height:1.55; max-width:34ch; margin:0 auto clamp(24px,4vh,34px); }
    .cta {
      display:inline-flex; align-items:center; gap:10px;
      padding:clamp(14px,2vh,17px) clamp(28px,5vw,36px); border-radius:999px;
      background:#0a0a0a; color:#fff; text-decoration:none; font-weight:600; font-size:clamp(1rem,2vh,1.08rem);
      transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s ease;
      box-shadow:0 10px 28px rgba(0,0,0,0.18);
    }
    .cta:hover { transform:translateY(-2px); box-shadow:0 16px 40px rgba(0,0,0,0.26); }
    .cta svg { transition:transform .25s ease; }
    .cta:hover svg { transform:translateX(4px); }
    .num { margin-top:clamp(16px,2.6vh,22px); color:var(--muted); font-size:clamp(0.92rem,1.9vh,1rem); }
    .num b { color:var(--fg); font-weight:600; }
    /* Desktop-only QR: scan with phone camera → opens Messages pre-filled */
    .qr { display:none; margin-top:clamp(20px,3.4vh,30px); }
    .qr-card { display:inline-block; padding:12px; background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.06); }
    .qrimg { width:146px; height:146px; display:block; }
    .qr-label { margin-top:12px; color:#9a9a9a; font-size:0.88rem; line-height:1.5; max-width:30ch; margin-left:auto; margin-right:auto; }
    @media (min-width:700px) and (min-height:620px) { .qr { display:block; } }
    @media (prefers-reduced-motion: reduce) { main { animation:none; } .cta, .cta svg { transition:none; } }
  </style>
</head>
<body>
  <main>
    <div class="check">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <p class="eyebrow">You're subscribed</p>
    <h1>Welcome to <em>Rehearse</em>.</h1>

    <a class="cta" href="sms:+13472682624?&body=I'm%20ready%20to%20start%20practicing.">
      Text to begin

  </main>
