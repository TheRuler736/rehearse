<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Rehearse</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --fg:#0a0a0a; --muted:#555; --line:#e3e3e3; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,-apple-system,sans-serif; color:var(--fg); background:#fff; line-height:1.6; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:560px; margin:0 auto; padding:56px 24px 80px; }
    a { color:#0a0a0a; }
    .back { display:inline-block; margin-bottom:30px; font-size:0.9rem; color:var(--muted); text-decoration:none; }
    h1 { font-family:'Instrument Serif',Georgia,serif; font-weight:400; font-size:2.6rem; letter-spacing:-0.01em; margin-bottom:8px; }
    .sub { color:var(--muted); margin-bottom:30px; }
    label { display:block; font-size:0.85rem; font-weight:600; margin:16px 0 6px; }
    input, textarea {
      width:100%; font-family:inherit; font-size:1rem; color:var(--fg);
      border:1px solid var(--line); border-radius:12px; padding:12px 14px; background:#fff;
      transition:border-color .15s ease;
    }
    input:focus, textarea:focus { outline:none; border-color:#0a0a0a; }
    textarea { min-height:140px; resize:vertical; }
    .hp { position:absolute; left:-9999px; }
    button {
      margin-top:22px; width:100%; padding:15px 24px; border:none; border-radius:999px;
      background:#0a0a0a; color:#fff; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease;
    }
    button:hover { transform:translateY(-1px); box-shadow:0 10px 26px rgba(0,0,0,0.18); }
    button:disabled { opacity:.6; cursor:default; transform:none; box-shadow:none; }
    .msg { margin-top:18px; font-size:0.95rem; }
    .ok { color:#0a0a0a; }
    .err { color:#b00020; }
    .done { text-align:center; padding:24px 0; }
    .done h2 { font-family:'Instrument Serif',Georgia,serif; font-weight:400; font-size:2rem; margin-bottom:8px; }
    .done p { color:var(--muted); }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Rehearse</a>

    <div id="formView">
      <h1>Contact us</h1>
      <p class="sub">Questions, feedback, or a privacy/data request? Send us a note and we'll get back to you.</p>

      <form id="contactForm" novalidate>
        <label for="name">Name <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input id="name" name="name" type="text" autocomplete="name" maxlength="80" />

        <label for="email">Email <span style="color:var(--muted);font-weight:400">(so we can reply)</span></label>
        <input id="email" name="email" type="email" autocomplete="email" maxlength="120" placeholder="you@example.com" />

        <label for="message">Message</label>
        <textarea id="message" name="message" maxlength="2000" required placeholder="How can we help?"></textarea>

        <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />

        <button type="submit" id="submitBtn">Send message</button>
        <p class="msg err hidden" id="errMsg"></p>
      </form>
    </div>

    <div id="doneView" class="done hidden">
      <h2>Thanks — message sent.</h2>
      <p>We'll get back to you soon. You can close this page.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const errMsg = document.getElementById('errMsg');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errMsg.classList.add('hidden');
      const message = document.getElementById('message').value.trim();
      if (!message) { errMsg.textContent = 'Please enter a message.'; errMsg.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await fetch('/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message,
            website: document.querySelector('input[name=website]').value,
          }),
        });
        if (!res.ok) throw new Error('failed');
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('doneView').classList.remove('hidden');
      } catch {
        errMsg.textContent = 'Something went wrong — please try again.';
        errMsg.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Send message';
      }
    });
  </script>
</body>
</html>
